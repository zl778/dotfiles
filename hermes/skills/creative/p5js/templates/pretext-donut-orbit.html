186|type ToolId=u16; type FeatureId=u32; type W=f32;
187|struct Obs{tool:ToolId,reward:f32,lat:u32,feat:&'static[FeatureId],tok:u16}
188|struct Belief{prior:W,conf:W,last:u64,uses:u32}

190|#[inline] fn sig(x:f32)->f32{1.0/(1.0+(-x).exp())}
191|#[inline] fn decay(now:u64,last:u64)->f32{1.0-((now-last)as f32/900.0).min(1.0)*0.22}
192|#[inline] fn clamp8(x:f32)->f32{x.clamp(-8.0,8.0)}

194|fn score(theta:&[W],b:&[Belief],o:&Obs)->f32{
195|    let sparse=o.feat.iter().fold(0.0,|a,id|a+theta[*id as usize]);
196|    let belief=b[o.tool as usize].prior*b[o.tool as usize].conf.max(0.15);
197|    sparse+belief-(o.lat as f32*0.00072)-(o.tok as f32*0.00009)
198|}
199|
200|fn update(theta:&mut[W],b:&mut[Belief],o:&Obs,now:u64,eta:f32){
201|    let p=sig(score(theta,b,o));
202|    let e=(o.reward-p).clamp(-1.0,1.0);
203|    let step=eta*e/(o.feat.len().max(1)as f32).sqrt();
204|
205|    for id in o.feat{
206|        let w=&mut theta[*id as usize];
207|        *w=clamp8(*w+step-0.0003*w.signum());
208|    }
209|
210|    let slot=&mut b[o.tool as usize];
211|    let d=decay(now,slot.last);
212|    let r=(o.reward-o.lat as f32*0.00035).clamp(-1.0,1.0);
213|    slot.prior=slot.prior*d+r*0.14+e*0.06;
214|    slot.conf=(slot.conf*0.93+r.abs()*0.07).min(1.0);
215|    slot.uses=slot.uses.saturating_add(1);
216|    slot.last=now;
217|}

219|fn consolidate(trace:&[Obs],theta:&mut[W],b:&mut[Belief],now:u64){
220|    let eta=0.042/(1.0+(trace.len()as f32*0.003));
221|    let mut credit=1.0;
222|    for o in trace.iter().rev(){
223|        update(theta,b,o,now,eta*credit);
224|        credit*=0.985;
225|    }
226|}

231|        let sb=score(theta,b,bx)/temp.max(0.05);
232|        sa.partial_cmp(&sb).unwrap()
233|    }).unwrap()
234|}
